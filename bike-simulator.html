                DE: { theft: 'THEFT_DEDUCTIBLE_NO_DEDUCTIBLE', damage: 'DAMAGE_DEDUCTIBLE_STANDARD_35_FIX' },
                FR: { theft: 'THEFT_DEDUCTIBLE_STANDARD_10PC', damage: 'DAMAGE_DEDUCTIBLE_ENGLISH_10PC' },
                NL: { theft: 'THEFT_DEDUCTIBLE_NO_DEDUCTIBLE', damage: 'DAMAGE_DEDUCTIBLE_STANDARD_35_FIX' },
                BE: { theft: 'THEFT_DEDUCTIBLE_STANDARD_10PC', damage: 'DAMAGE_DEDUCTIBLE_ENGLISH_10PC' }
            };

            const packages = [
                { id: 'VARIANT_THEFT_DAMAGE_ASSISTANCE', name: 'Omnium (Theft, Damage, Assistance)', icon: 'shield-check' },
                { id: 'VARIANT_THEFT_ASSISTANCE', name: 'Theft & Assistance', icon: 'lock' },
                { id: 'VARIANT_DAMAGE_ASSISTANCE', name: 'Damage & Assistance (Damage Alone)', icon: 'wrench' }
            ];
            
            const countries = [
                { id: 'DE', name: 'Germany', flag: '🇩🇪' },
                { id: 'FR', name: 'France', flag: '🇫🇷' },
                { id: 'NL', name: 'Netherlands', flag: '🇳🇱' },
                { id: 'BE', name: 'Belgium', flag: '🇧🇪' }
            ];

            const computePrice = (country, pkg) => {
                const stateVars = { 
                    bikeType, 
                    bikeValue, 
                    zipCode, 
                    applyDepreciation: false, // Enforcing No Depreciation
                    antiTheft, 
                    theftDeductible: defaultDeductibles[country].theft, 
                    damageDeductible: defaultDeductibles[country].damage 
                };
                
                const rate = TAX_RATES[country];
                let totalNip = 0, totalTax = 0;

                if (pkg === 'VARIANT_THEFT_ASSISTANCE') {
                    totalNip = calculateTheftNIP(country, stateVars);
                    totalTax = totalNip * rate;
                } else if (pkg === 'VARIANT_THEFT_DAMAGE_ASSISTANCE') {
                    totalNip = calculateTheftNIP(country, stateVars) + calculateDamageNIP(country, stateVars);
                    totalTax = totalNip * rate;
                } else if (pkg === 'VARIANT_DAMAGE_ASSISTANCE') {
                    const cip = bikeValue < 5000 ? 67.2 : 107.52;
                    totalNip = cip / (1 + rate);
                    totalTax = cip - totalNip;
                }

                if (country === 'FR') totalTax += FR_GAREAT;
                
                return {
                    nip: totalNip,
                    tax: totalTax,
                    cip: totalNip + totalTax
                };
            };

            const fmt = (num) => new Intl.NumberFormat('en-EU', { style: 'currency', currency: 'EUR' }).format(num);

            const isFatbike = bikeType === 'TYPE_FATBIKE_BIKE';
            const isInvalidValue = bikeValue < 250 || bikeValue > 10000;
            const showTables = !isFatbike && !isInvalidValue;

            return (
                <div className="min-h-screen p-4 md:p-8 text-gray-800">
                    <div className="max-w-6xl mx-auto space-y-6">
                        <header className="flex items-center space-x-3 mb-8">
                            <div className="p-3 bg-indigo-600 text-white rounded-xl shadow-lg">
                                <i data-lucide="table-2" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Global Pricing Matrix</h1>
                                <p className="text-sm text-gray-500">Cross-country B2B price overview (Defaults: No Depreciation)</p>
                            </div>
                        </header>

                        {/* Configuration Panel */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
                            <h2 className="text-lg font-semibold mb-4 flex items-center border-b pb-3">
                                <i data-lucide="bike" className="w-5 h-5 mr-2 text-indigo-500"></i>
                                Bike Profile
                            </h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Bike Type</label>
                                    <select className={`w-full p-2.5 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none ${isFatbike ? 'border-red-400 bg-red-50' : 'border-gray-200'}`} value={bikeType} onChange={e => setBikeType(e.target.value)}>
                                        <option value="TYPE_REGULAR_BIKE">Regular Bike</option>
                                        <option value="TYPE_REGULAR_EBIKE">Regular E-Bike</option>
                                        <option value="TYPE_MOUNTAIN_BIKE">Mountain Bike</option>
                                        <option value="TYPE_MOUNTAIN_EBIKE">Mountain E-Bike</option>
                                        <option value="TYPE_RACE_BIKE">Race Bike</option>
                                        <option value="TYPE_RACE_EBIKE">Race E-Bike</option>
                                        <option value="TYPE_CARGO_BIKE">Cargo Bike</option>
                                        <option value="TYPE_CARGO_EBIKE">Cargo E-Bike</option>
                                        <option value="TYPE_FATBIKE_BIKE">Fatbike</option>
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Bike Value (€)</label>
                                    <div className="relative">
                                        <span className="absolute left-3 top-2.5 text-gray-500 text-sm">€</span>
                                        <input type="number" min="250" max="10000" className={`w-full p-2.5 pl-7 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none ${isInvalidValue ? 'border-red-400 bg-red-50' : 'border-gray-200'}`} value={bikeValue} onChange={e => setBikeValue(Number(e.target.value))} />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Anti-Theft Security</label>
                                    <select className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value={antiTheft} onChange={e => setAntiTheft(e.target.value)}>
                                        <option value="ANTI_THEFT_MEASURE_NONE">Standard Lock</option>
                                        <option value="ANTI_THEFT_MEASURE_GPS_ANTITHEFT">Active GPS Tracker</option>
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-medium text-gray-700">Zip Code (Optional)</label>
                                    <input type="text" placeholder="e.g. 1000, 75001" className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value={zipCode} onChange={e => setZipCode(e.target.value)} />
                                </div>
                            </div>
                            {(isFatbike || isInvalidValue) && (
                                <div className="mt-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg flex items-center">
                                    <i data-lucide="alert-triangle" className="w-5 h-5 mr-2"></i>
                                    {isFatbike ? "Fatbikes are not eligible." : "Bike value must be between €250 and €10,000."}
                                </div>
                            )}
                        </div>

                        {/* Tables Grid */}
                        {showTables && (
                            <div className="space-y-8">
                                {packages.map(pkg => (
                                    <div key={pkg.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex items-center">
                                            <i data-lucide={pkg.icon} className="w-5 h-5 mr-2 text-indigo-600"></i>
                                            <h3 className="font-bold text-gray-800 text-lg">{pkg.name}</h3>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-white text-sm text-gray-500 border-b border-gray-100 uppercase tracking-wide">
                                                        <th className="py-4 px-6 font-semibold">Country</th>
                                                        <th className="py-4 px-6 font-semibold text-right">Net Premium (NIP)</th>
                                                        <th className="py-4 px-6 font-semibold text-right">Taxes & Fees</th>
                                                        <th className="py-4 px-6 font-semibold text-right">Gross Price (CIP/GIP)</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {countries.map(country => {
                                                        const prices = computePrice(country.id, pkg.id);
                                                        return (
                                                            <tr key={country.id} className="hover:bg-gray-50/50 transition-colors">
                                                                <td className="py-4 px-6 font-medium text-gray-900">
                                                                    <span className="mr-3 text-lg">{country.flag}</span>
                                                                    {country.name}
                                                                </td>
                                                                <td className="py-4 px-6 text-right text-gray-600 font-medium">{fmt(prices.nip)}</td>
                                                                <td className="py-4 px-6 text-right text-gray-600 font-medium">{fmt(prices.tax)}</td>
                                                                <td className="py-4 px-6 text-right font-bold text-indigo-700 bg-indigo-50/30 text-lg">{fmt(prices.cip)}</td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons
        setTimeout(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 100);
    </script>
</body>
</html>
