<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Key Extractor</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    var require = { paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.40.0/min/vs' } };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.40.0/min/vs/loader.min.js"></script>

  <style>
    /* Custom scrollbar for a cleaner look */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* Resizer styles */
    .resizer {
      cursor: row-resize;
      height: 12px;
      background-color: #f8fafc;
      border-top: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s;
    }
    .resizer:hover, .resizer.dragging {
      background-color: #e2e8f0;
    }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800 overflow-hidden">

  <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
    <div class="flex items-center gap-3">
      <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
      <div>
        <h1 class="text-xl font-bold leading-tight">Translation Extractor</h1>
        <p class="text-slate-400 text-xs">Parse and evaluate dynamic EJS keys</p>
      </div>
    </div>
    <div class="flex gap-3">
      <button id="extract-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-md shadow-sm text-sm font-semibold transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        Extract Keys
      </button>
      <button id="export-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-md shadow-sm text-sm font-semibold transition-colors flex items-center gap-2 hidden">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        Export CSV
      </button>
    </div>
  </header>

  <main class="flex-1 flex flex-col overflow-hidden">
    
    <div id="top-panel" class="flex flex-col lg:flex-row gap-4 p-4 shrink-0" style="height: 45%;">
      
      <div class="flex-1 flex flex-col border border-gray-300 rounded-lg bg-white shadow-sm overflow-hidden relative">
        <div class="px-3 py-2 bg-slate-100 border-b border-gray-300 font-semibold text-xs text-slate-600 uppercase tracking-wider flex justify-between items-center">
          HTML Template
          <span class="text-indigo-600 font-mono lowercase">.ejs</span>
        </div>
        <div id="html-editor" class="flex-1 w-full h-full"></div>
      </div>

      <div class="flex-1 flex flex-col border border-gray-300 rounded-lg bg-white shadow-sm overflow-hidden relative">
        <div class="px-3 py-2 bg-slate-100 border-b border-gray-300 font-semibold text-xs text-slate-600 uppercase tracking-wider flex justify-between items-center">
          JSON Payload
          <span class="text-indigo-600 font-mono lowercase">data variable</span>
        </div>
        <div id="json-editor" class="flex-1 w-full h-full"></div>
      </div>
    </div>

    <div id="drag-resizer" class="resizer shrink-0 relative group">
      <div class="absolute inset-y-0 w-full flex justify-center items-center">
        <button id="toggle-panel-btn" class="bg-white border border-gray-300 text-gray-500 hover:text-indigo-600 rounded-full p-1 shadow-sm transform transition-transform z-10 opacity-0 group-hover:opacity-100 focus:opacity-100" title="Toggle Editors">
          <svg id="toggle-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
        </button>
      </div>
    </div>

    <div class="flex-1 flex flex-col bg-white overflow-hidden relative">
      <div class="px-4 py-2 border-b border-gray-200 flex justify-between items-center bg-gray-50 shrink-0">
        <h2 class="font-semibold text-slate-700 text-sm">Extraction Results</h2>
        <span id="result-count" class="text-xs bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full font-medium hidden"></span>
      </div>
      
      <div class="flex-1 overflow-auto p-4">
        <table class="w-full text-left border-collapse" id="results-table">
          <thead class="sticky top-0 bg-white shadow-sm z-10 ring-1 ring-gray-200">
            <tr>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase w-1/2">Original Expression</th>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase w-1/2">Computed Translation Key</th>
            </tr>
          </thead>
          <tbody id="results-body" class="divide-y divide-gray-100 border-b border-gray-200">
            <tr>
              <td colspan="2" class="p-12 text-slate-400 text-center text-sm">
                <div class="flex flex-col items-center gap-2">
                  <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                  <p>Paste your HTML and JSON above, then click <strong>Extract Keys</strong>.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    let htmlEditor, jsonEditor;
    let extractedData = [];
    let isPanelCollapsed = false;
    let previousPanelHeight = '45%';

    // --- Monaco Editor Setup ---
    require(['vs/editor/editor.main'], function () {
      htmlEditor = monaco.editor.create(document.getElementById('html-editor'), {
        value: ``,
        language: 'html',
        theme: 'vs-light',
        minimap: { enabled: false },
        automaticLayout: true,
        wordWrap: 'on'
      });

      jsonEditor = monaco.editor.create(document.getElementById('json-editor'), {
        value: `{\n  "contract": {},\n  "refs": {}\n}`,
        language: 'json',
        theme: 'vs-light',
        minimap: { enabled: false },
        automaticLayout: true
      });
    });

    // --- Resizer Logic ---
    const resizer = document.getElementById('drag-resizer');
    const topPanel = document.getElementById('top-panel');
    let isDragging = false;

    resizer.addEventListener('mousedown', (e) => {
      // Don't trigger drag if clicking the toggle button
      if (e.target.closest('button')) return; 
      isDragging = true;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'row-resize';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      // Calculate new height (accounting for header height ~64px)
      const headerHeight = document.querySelector('header').offsetHeight;
      let newHeight = e.clientY - headerHeight;
      
      // Constraints
      if (newHeight < 60) newHeight = 60; // Min height
      if (newHeight > window.innerHeight - 150) newHeight = window.innerHeight - 150; // Max height
      
      topPanel.style.height = `${newHeight}px`;
      isPanelCollapsed = false;
      document.getElementById('toggle-icon').setAttribute('d', 'M5 15l7-7 7 7'); // Up arrow
      
      if (htmlEditor && jsonEditor) {
        htmlEditor.layout();
        jsonEditor.layout();
      }
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
      }
    });

    // --- Collapse Toggle Logic ---
    document.getElementById('toggle-panel-btn').addEventListener('click', () => {
      const icon = document.getElementById('toggle-icon');
      if (isPanelCollapsed) {
        topPanel.style.height = previousPanelHeight;
        topPanel.style.display = 'flex';
        icon.setAttribute('d', 'M5 15l7-7 7 7'); // Up arrow
        isPanelCollapsed = false;
      } else {
        previousPanelHeight = topPanel.style.height;
        topPanel.style.display = 'none';
        icon.setAttribute('d', 'M19 9l-7 7-7-7'); // Down arrow
        isPanelCollapsed = true;
      }
      // Force Monaco layout update after small delay to allow CSS reflow
      setTimeout(() => {
        if(htmlEditor) htmlEditor.layout();
        if(jsonEditor) jsonEditor.layout();
      }, 10);
    });

    // --- Extraction Logic ---
    document.getElementById('extract-btn').addEventListener('click', () => {
      const htmlText = htmlEditor.getValue();
      const jsonText = jsonEditor.getValue();
      const tbody = document.getElementById('results-body');
      const exportBtn = document.getElementById('export-btn');
      const countBadge = document.getElementById('result-count');
      
      let parsedData = {};
      
      try {
        parsedData = JSON.parse(jsonText);
      } catch (err) {
        alert("Invalid JSON payload. Please fix syntax errors.\n" + err.message);
        return;
      }

      // Regex matching everything inside translator(...) before object parameters or end parenthesis
      const regex = /translator\(\s*((?:'(?:\\'|[^'])*'|"(?:\\"|[^"])*"|[^,)]+)+)/g;
      
      extractedData = [];
      const seenExpressions = new Set();
      let match;

      while ((match = regex.exec(htmlText)) !== null) {
        const expression = match[1].trim();
        
        if (seenExpressions.has(expression)) continue;
        seenExpressions.add(expression);

        let computedKey = "";
        let hasError = false;

        try {
          const evaluator = new Function('data', `return ${expression}`);
          computedKey = evaluator(parsedData);
          if (computedKey === undefined) throw new Error('Evaluated to undefined');
        } catch (err) {
          computedKey = err.message;
          hasError = true;
        }

        extractedData.push({
          expression: expression,
          computed: computedKey,
          hasError: hasError
        });
      }

      // Render
      if (extractedData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="2" class="p-8 text-slate-500 text-center">No translator keys found in the HTML.</td></tr>`;
        exportBtn.classList.add('hidden');
        countBadge.classList.add('hidden');
        return;
      }

      tbody.innerHTML = '';
      extractedData.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors group";
        
        let computedHtml = '';
        if (item.hasError) {
          computedHtml = `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800 border border-red-200">Error: ${escapeHtml(item.computed)}</span>`;
        } else {
          computedHtml = `
            <div class="flex items-center justify-between">
              <span class="text-slate-800 font-mono text-sm">${escapeHtml(item.computed)}</span>
              <button onclick="copyToClipboard('${escapeHtml(item.computed).replace(/'/g, "\\'")}', this)" class="opacity-0 group-hover:opacity-100 transition-opacity text-slate-400 hover:text-indigo-600 p-1" title="Copy Key">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
              </button>
            </div>`;
        }

        tr.innerHTML = `
          <td class="p-3 text-sm font-mono text-slate-500 break-all bg-white border-r border-slate-100 w-1/2">${escapeHtml(item.expression)}</td>
          <td class="p-3 w-1/2">${computedHtml}</td>
        `;
        tbody.appendChild(tr);
      });

      exportBtn.classList.remove('hidden');
      countBadge.textContent = `${extractedData.length} Keys Extracted`;
      countBadge.classList.remove('hidden');
    });

    // --- Copy to Clipboard Utility ---
    window.copyToClipboard = function(text, btnElement) {
      navigator.clipboard.writeText(text).then(() => {
        const originalSvg = btnElement.innerHTML;
        // Show checkmark
        btnElement.innerHTML = `<svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
        setTimeout(() => { btnElement.innerHTML = originalSvg; }, 1500);
      });
    };

    // --- CSV Export Logic ---
    document.getElementById('export-btn').addEventListener('click', () => {
      if (extractedData.length === 0) return;
      const csvRows = ['Original Expression,Computed Key'];
      extractedData.forEach(item => {
        const exp = `"${item.expression.replace(/"/g, '""')}"`;
        const comp = item.hasError ? `"#ERROR: ${item.computed.replace(/"/g, '""')}"` : `"${item.computed.replace(/"/g, '""')}"`;
        csvRows.push(`${exp},${comp}`);
      });

      const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'translation_keys.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    function escapeHtml(unsafe) {
      if (typeof unsafe !== 'string') return String(unsafe);
      return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
