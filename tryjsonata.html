<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONata Playground</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Check local storage for theme to prevent FOUC (Flash of Unstyled Content)
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
        
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#1e1e1e',
                        darkPanel: '#252526',
                        darkBorder: '#3c3c3c',
                        darkHover: '#333333'
                    }
                }
            }
        }
    </script>
    
    <!-- JSONata Engine -->
    <script src="https://cdn.jsdelivr.net/npm/jsonata@2.0.2/jsonata.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Split.js for Resizable Panels -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

    <style>
        /* Split.js Gutter Styling */
        .gutter {
            background-color: #e5e7eb;
            background-repeat: no-repeat;
            background-position: 50%;
            transition: background-color 0.2s ease;
            position: relative;
            z-index: 10;
        }
        .dark .gutter {
            background-color: #252526;
        }
        .gutter::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 122, 204, 0);
            transition: background 0.2s ease;
        }
        .gutter:hover::after, .gutter.gutter-dragging::after {
            background: rgba(0, 122, 204, 1);
        }
        .gutter.gutter-horizontal {
            cursor: col-resize;
            border-left: 1px solid #d1d5db;
            border-right: 1px solid #d1d5db;
        }
        .dark .gutter.gutter-horizontal {
            border-left: 1px solid #3c3c3c;
            border-right: 1px solid #3c3c3c;
        }
        .gutter.gutter-vertical {
            cursor: row-resize;
            border-top: 1px solid #d1d5db;
            border-bottom: 1px solid #d1d5db;
        }
        .dark .gutter.gutter-vertical {
            border-top: 1px solid #3c3c3c;
            border-bottom: 1px solid #3c3c3c;
        }

        /* Monaco overrides */
        .monaco-editor .margin {
            background-color: #f9fafb !important;
        }
        .dark .monaco-editor .margin {
            background-color: #1e1e1e !important;
        }
        
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        .dark ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; border: 2px solid #f3f4f6; }
        .dark ::-webkit-scrollbar-thumb { background: #424242; border: 2px solid #1e1e1e; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #4f4f4f; }
        
        /* Dropdown transition */
        .dropdown-menu {
            transform-origin: top right;
            transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200 bg-gray-50 dark:bg-darkBg h-screen flex flex-col font-sans overflow-hidden transition-colors duration-200">

    <!-- Header Navigation -->
    <header class="bg-white dark:bg-darkPanel border-b border-gray-300 dark:border-darkBorder p-3 px-5 flex justify-between items-center z-10 shrink-0 relative transition-colors duration-200">
        <div class="flex items-center gap-3">
            <svg class="w-7 h-7 text-[#007acc]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            <h1 class="text-xl font-semibold tracking-wide text-gray-800 dark:text-gray-100">JSONata <span class="text-[#007acc] font-light">Playground</span></h1>
        </div>
        <div class="flex gap-3 items-center">
            
            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="text-sm text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white transition flex items-center justify-center bg-gray-100 dark:bg-[#333333] hover:bg-gray-200 dark:hover:bg-darkBorder w-8 h-8 rounded border border-gray-300 dark:border-[#4a4a4a]" title="Toggle Dark/Light Mode">
                <i id="theme-icon" data-lucide="sun" class="w-4 h-4"></i>
            </button>

            <!-- Examples Dropdown -->
            <div class="relative">
                <button id="examples-btn" onclick="toggleDropdown()" class="text-sm text-gray-700 dark:text-gray-300 hover:text-black dark:hover:text-white transition flex items-center gap-1.5 bg-gray-100 dark:bg-[#333333] hover:bg-gray-200 dark:hover:bg-darkBorder px-3 py-1.5 rounded border border-gray-300 dark:border-[#4a4a4a]">
                    <i data-lucide="library" class="w-4 h-4 text-yellow-500"></i> Examples <i data-lucide="chevron-down" class="w-3 h-3 ml-1"></i>
                </button>
                <div id="examples-dropdown" class="dropdown-menu absolute right-0 mt-2 w-56 bg-white dark:bg-darkPanel border border-gray-200 dark:border-darkBorder rounded shadow-2xl opacity-0 scale-95 pointer-events-none z-50 overflow-hidden">
                    <div class="px-3 py-2 border-b border-gray-200 dark:border-darkBorder bg-gray-50 dark:bg-darkBg">
                        <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Snippets</span>
                    </div>
                    <ul class="py-1" id="examples-list">
                        <!-- Populated via JS -->
                    </ul>
                </div>
            </div>

            <a href="https://docs.jsonata.org/" target="_blank" class="text-sm text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition flex items-center gap-1.5 bg-gray-100 dark:bg-[#333333] hover:bg-gray-200 dark:hover:bg-darkBorder px-3 py-1.5 rounded border border-transparent dark:border-transparent">
                <i data-lucide="book" class="w-4 h-4"></i> Docs
            </a>
            <button id="share-btn" onclick="copyShareLink()" class="bg-[#007acc] hover:bg-[#0098ff] text-white px-4 py-1.5 rounded text-sm font-medium transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="share-2" class="w-4 h-4"></i> <span>Share</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main id="main-layout" class="flex-1 flex flex-row overflow-hidden w-full bg-gray-200 dark:bg-darkBg">
        
        <!-- Left Panel: JSON Input -->
        <section id="pane-left" class="flex flex-col h-full bg-white dark:bg-darkBg overflow-hidden transition-colors">
            <div class="bg-gray-100 dark:bg-darkPanel p-2 px-4 flex justify-between items-center shrink-0 h-10 border-b border-gray-200 dark:border-transparent">
                <h2 class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="database" class="w-4 h-4 text-green-600 dark:text-green-500"></i> JSON Data
                </h2>
                <div class="flex gap-2">
                    <button onclick="pruneJSONData()" class="text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition p-1 rounded hover:bg-gray-200 dark:hover:bg-darkHover" title="Reduce JSON Data (Keep Used Keys)">
                        <i data-lucide="scissors" class="w-4 h-4"></i>
                    </button>
                    <button onclick="formatJSON()" class="text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition p-1 rounded hover:bg-gray-200 dark:hover:bg-darkHover" title="Format JSON (Shift+Alt+F)">
                        <i data-lucide="align-left" class="w-4 h-4"></i>
                    </button>
                    <button onclick="copyEditorContent(jsonEditor)" class="text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition p-1 rounded hover:bg-gray-200 dark:hover:bg-darkHover" title="Copy JSON">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 relative w-full h-full">
                <div id="json-editor" class="absolute inset-0"></div>
            </div>
        </section>

        <!-- Right Panel: Query & Result -->
        <section id="pane-right" class="flex flex-col h-full overflow-hidden">
            
            <!-- Top Right: JSONata Expression -->
            <div id="pane-top-right" class="flex flex-col h-full bg-white dark:bg-darkBg overflow-hidden transition-colors">
                <div class="bg-gray-100 dark:bg-darkPanel p-2 px-4 flex justify-between items-center shrink-0 h-10 border-b border-gray-200 dark:border-transparent">
                    <h2 class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="code-2" class="w-4 h-4 text-[#007acc]"></i> JSONata Expression
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="minifyQuery()" class="text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition p-1 rounded hover:bg-gray-200 dark:hover:bg-darkHover" title="Make 1-Line (Keep \n breaks)">
                            <i data-lucide="minimize-2" class="w-4 h-4"></i>
                        </button>
                        <button onclick="copyEditorContent(queryEditor)" class="text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition p-1 rounded hover:bg-gray-200 dark:hover:bg-darkHover" title="Copy Query">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div class="flex-1 relative w-full h-full">
                    <div id="query-editor" class="absolute inset-0"></div>
                </div>
            </div>

            <!-- Bottom Right: Evaluation Result -->
            <div id="pane-bottom-right" class="flex flex-col h-full bg-white dark:bg-darkBg overflow-hidden relative transition-colors">
                <div class="bg-gray-100 dark:bg-darkPanel p-2 px-4 flex justify-between items-center shrink-0 h-10 border-b border-gray-200 dark:border-transparent">
                    <h2 class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="terminal" class="w-4 h-4 text-purple-600 dark:text-purple-400"></i> Result
                    </h2>
                    <button onclick="copyEditorContent(resultEditor)" class="text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition p-1 rounded hover:bg-gray-200 dark:hover:bg-darkHover" title="Copy Result">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="flex-1 relative w-full h-full">
                    <div id="result-editor" class="absolute inset-0"></div>
                </div>
                <!-- Error Overlay -->
                <div id="error-overlay" class="absolute bottom-0 left-0 right-0 bg-red-100 text-red-700 dark:bg-[#3a0000]/90 dark:text-[#ff8080] p-3 text-sm font-mono hidden border-t border-red-300 dark:border-[#660000] max-h-40 overflow-y-auto z-20 backdrop-blur-sm transition-all duration-200 shadow-[0_-4px_15px_rgba(0,0,0,0.1)] dark:shadow-[0_-4px_15px_rgba(0,0,0,0.5)]">
                </div>
            </div>
            
        </section>
    </main>

    <!-- IDE Status Bar -->
    <footer id="status-bar" class="bg-[#007acc] text-white text-xs px-3 py-1 flex justify-between items-center z-20 shrink-0 transition-colors duration-300">
        <div class="flex items-center gap-4">
            <span id="status-message" class="flex items-center gap-1.5 font-medium">
                <i data-lucide="check-circle" class="w-3.5 h-3.5" id="status-icon"></i> <span id="status-text">Ready</span>
            </span>
        </div>
        <div class="flex items-center gap-4">
            <span id="eval-time" class="font-mono">0ms</span>
            <span class="opacity-80 hover:opacity-100 cursor-pointer transition relative group" onclick="triggerEasterEgg()" title="Nothing to see here...">
                JSONata v2.0.2
            </span>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 right-4 bg-white dark:bg-darkPanel text-gray-800 dark:text-white border border-gray-200 dark:border-darkBorder px-4 py-2 rounded shadow-xl transition-all duration-300 transform translate-y-4 opacity-0 pointer-events-none z-50 flex items-center gap-2">
        <i data-lucide="info" class="w-4 h-4 text-[#007acc]"></i>
        <span id="toast-msg">Copied!</span>
    </div>

    <script>
        // Google Apps Script Web App URL
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyDjxN1zoLbdXC-NCn26hVof4B9sOretgNnjkSX8vYF12X6eE-obs0hINx1LCEGd5VP5A/exec";

        // --- Theme Logic ---
        let isDark = localStorage.getItem('theme') !== 'light';
        const initialThemeIcon = document.getElementById('theme-icon');
        if (initialThemeIcon) {
            initialThemeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        }

        // Initialize Lucide Icons safely
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        function toggleTheme() {
            isDark = !isDark;
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            
            if (isDark) {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.setAttribute('data-lucide', 'sun');
                if (monaco && monaco.editor) monaco.editor.setTheme('jsonataTheme');
            } else {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeIcon.setAttribute('data-lucide', 'moon');
                if (monaco && monaco.editor) monaco.editor.setTheme('jsonataThemeLight');
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // --- Layout UI Init (Split.js) ---
        let mainSplit, rightSplit;
        
        function initLayouts() {
            const isMobile = window.innerWidth < 768;
            
            if(mainSplit) mainSplit.destroy();
            if(rightSplit) rightSplit.destroy();

            if (!isMobile) {
                document.getElementById('main-layout').classList.remove('flex-col');
                document.getElementById('main-layout').classList.add('flex-row');
                
                mainSplit = Split(['#pane-left', '#pane-right'], {
                    sizes: [40, 60], minSize: 300, gutterSize: 6, cursor: 'col-resize', onDrag: updateEditorLayouts
                });

                rightSplit = Split(['#pane-top-right', '#pane-bottom-right'], {
                    direction: 'vertical', sizes: [40, 60], minSize: 150, gutterSize: 6, cursor: 'row-resize', onDrag: updateEditorLayouts
                });
            } else {
                document.getElementById('main-layout').classList.remove('flex-row');
                document.getElementById('main-layout').classList.add('flex-col');
                
                mainSplit = Split(['#pane-left', '#pane-right'], {
                    direction: 'vertical', sizes: [33, 67], minSize: 200, gutterSize: 6, cursor: 'row-resize', onDrag: updateEditorLayouts
                });

                rightSplit = Split(['#pane-top-right', '#pane-bottom-right'], {
                    direction: 'vertical', sizes: [50, 50], minSize: 150, gutterSize: 6, cursor: 'row-resize', onDrag: updateEditorLayouts
                });
            }
        }

        initLayouts();
        window.addEventListener('resize', () => { initLayouts(); updateEditorLayouts(); });

        // --- Snippets & Examples Library ---
        const snippetLibrary = {
            "basic": {
                label: "Basic Filtering",
                icon: "filter",
                data: { "Account": { "Account Name": "Firefly", "Order": [ { "OrderID": "order103", "Product": [ { "Product Name": "Bowler Hat", "Price": 34.45 }, { "Product Name": "Trilby hat", "Price": 21.67 } ] }, { "OrderID": "order104", "Product": [ { "Product Name": "Bowler Hat", "Price": 34.45 }, { "Product Name": "Cloak", "Price": 107.99 } ] } ] } },
                query: "Account.Order[0].Product[0].`Product Name`"
            },
            "math": {
                label: "Math & Aggregation",
                icon: "calculator",
                data: { "Invoices": [ { "Id": 1, "Amount": 120.50, "Status": "Paid" }, { "Id": 2, "Amount": 340.00, "Status": "Pending" }, { "Id": 3, "Amount": 55.20, "Status": "Paid" } ] },
                query: "/* Calculate total of Paid invoices */\n$sum(Invoices[Status='Paid'].Amount)"
            },
            "transform": {
                label: "Object Transformation",
                icon: "braces",
                data: { "customers": [ { "firstname": "John", "lastname": "Doe", "age": 28 }, { "firstname": "Jane", "lastname": "Smith", "age": 34 } ] },
                query: "/* Restructure array of objects */\ncustomers.{\n  \"fullName\": firstname & \" \" & lastname,\n  \"isAdult\": age >= 18\n}"
            },
            "sorting": {
                label: "Sorting & Grouping",
                icon: "arrow-down-a-z",
                data: { "Catalog": [ {"Category": "Books", "Title": "Dune", "Price": 15}, {"Category": "Electronics", "Title": "Mouse", "Price": 25}, {"Category": "Books", "Title": "1984", "Price": 10} ] },
                query: "/* Group by Category, then sort items by price */\nCatalog{ Category: [ $ ^(Price) ] }"
            }
        };

        const defaultData = snippetLibrary.basic.data;
        const defaultQuery = snippetLibrary.basic.query;

        // Populate Dropdown
        const examplesList = document.getElementById('examples-list');
        Object.keys(snippetLibrary).forEach(key => {
            const item = snippetLibrary[key];
            const li = document.createElement('li');
            li.innerHTML = `<button onclick="loadSnippet('${key}')" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-[#007acc] hover:text-black dark:hover:text-white transition flex items-center gap-3"><i data-lucide="${item.icon}" class="w-4 h-4 opacity-70"></i> ${item.label}</button>`;
            examplesList.appendChild(li);
        });

        // Dropdown Logic
        let dropdownOpen = false;
        function toggleDropdown() {
            const menu = document.getElementById('examples-dropdown');
            dropdownOpen = !dropdownOpen;
            if(dropdownOpen) {
                menu.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                menu.classList.add('opacity-100', 'scale-100');
            } else {
                menu.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                menu.classList.remove('opacity-100', 'scale-100');
            }
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (dropdownOpen && !e.target.closest('.relative')) {
                toggleDropdown();
            }
        });

        function loadSnippet(key) {
            const snippet = snippetLibrary[key];
            jsonEditor.setValue(JSON.stringify(snippet.data, null, 2));
            queryEditor.setValue(snippet.query);
            toggleDropdown();
            showToast(`Loaded example: ${snippet.label}`);
        }

        // Global Editor Instances
        let jsonEditor, queryEditor, resultEditor;

        function debounce(func, wait) {
            let timeout;
            return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); };
        }

        // --- Initialize Monaco Editors with Custom Language ---
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], async function() {
            
            monaco.languages.register({ id: 'jsonata' });
            
            monaco.languages.setMonarchTokensProvider('jsonata', {
                tokenizer: {
                    root: [
                        [/\$[a-zA-Z0-9_]*/, 'variable.name'], 
                        [/`[^`]*`/, 'identifier.quote'],       
                        [/"([^"\\]|\\.)*$/, 'string.invalid'],
                        [/"/, 'string', '@string'],
                        [/[0-9]+(\.[0-9]+)?([eE][\-+]?[0-9]+)?/, 'number'],
                        [/[=><!~?&|+\-*\/\^%]+/, 'operator'],
                        [/\/\*/, 'comment', '@comment'],       
                    ],
                    string: [
                        [/[^\\"]+/, 'string'],
                        [/\\./, 'string.escape'],
                        [/"/, 'string', '@pop']
                    ],
                    comment: [
                        [/[^\/*]+/, 'comment'],
                        [/\*\//, 'comment', '@pop'],
                        [/[\/*]/, 'comment']
                    ]
                }
            });

            // Dark Theme
            monaco.editor.defineTheme('jsonataTheme', {
                base: 'vs-dark', inherit: true,
                rules: [
                    { token: 'variable.name', foreground: '9cdcfe' },
                    { token: 'identifier.quote', foreground: 'ce9178' },
                    { token: 'operator', foreground: 'd4d4d4' }
                ],
                colors: {
                    'editor.background': '#1e1e1e'
                }
            });

            // Light Theme
            monaco.editor.defineTheme('jsonataThemeLight', {
                base: 'vs', inherit: true,
                rules: [
                    { token: 'variable.name', foreground: '001080' },
                    { token: 'identifier.quote', foreground: 'a31515' },
                    { token: 'operator', foreground: '000000' }
                ],
                colors: {
                    'editor.background': '#f9fafb'
                }
            });

            monaco.languages.registerCompletionItemProvider('jsonata', {
                provideCompletionItems: function(model, position) {
                    const suggestions = [
                        { label: '$sum', kind: monaco.languages.CompletionItemKind.Function, insertText: '$sum(${1:array})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Returns the sum of an array of numbers' },
                        { label: '$count', kind: monaco.languages.CompletionItemKind.Function, insertText: '$count(${1:array})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Returns the number of items in an array' },
                        { label: '$average', kind: monaco.languages.CompletionItemKind.Function, insertText: '$average(${1:array})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Returns the average value of an array of numbers' },
                        { label: '$uppercase', kind: monaco.languages.CompletionItemKind.Function, insertText: '$uppercase(${1:string})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Converts a string to uppercase' },
                        { label: '$lowercase', kind: monaco.languages.CompletionItemKind.Function, insertText: '$lowercase(${1:string})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Converts a string to lowercase' },
                        { label: '$join', kind: monaco.languages.CompletionItemKind.Function, insertText: '$join(${1:array}, ${2:separator})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Joins an array of strings into a single string' },
                        { label: '$split', kind: monaco.languages.CompletionItemKind.Function, insertText: '$split(${1:string}, ${2:separator})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Splits a string into an array of strings' },
                        { label: '$map', kind: monaco.languages.CompletionItemKind.Function, insertText: '$map(${1:array}, function($v, $i, $a) {\n  ${2:/* expression */}\n})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Maps over an array' },
                        { label: '$filter', kind: monaco.languages.CompletionItemKind.Function, insertText: '$filter(${1:array}, function($v, $i, $a) {\n  ${2:/* condition */}\n})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, detail: 'Filters an array' },
                    ];
                    return { suggestions: suggestions };
                }
            });

            const commonOptions = {
                theme: isDark ? 'jsonataTheme' : 'jsonataThemeLight',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14, lineHeight: 22,
                fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
                scrollBeyondLastLine: false,
                renderLineHighlight: 'gutter',
                smoothScrolling: true,
                padding: { top: 12, bottom: 12 },
                scrollbar: { verticalScrollbarSize: 10, horizontalScrollbarSize: 10 }
            };

            jsonEditor = monaco.editor.create(document.getElementById('json-editor'), {
                ...commonOptions, value: '// Loading...', language: 'json', formatOnPaste: true, formatOnType: true
            });

            queryEditor = monaco.editor.create(document.getElementById('query-editor'), {
                ...commonOptions, value: '// Loading...', language: 'jsonata', lineNumbers: "off", wordWrap: "on"
            });

            resultEditor = monaco.editor.create(document.getElementById('result-editor'), {
                ...commonOptions, value: '', language: 'json', readOnly: true, wordWrap: "on"
            });

            await loadState();

            jsonEditor.onDidChangeModelContent(debounce(evaluate, 200));
            queryEditor.onDidChangeModelContent(debounce(evaluate, 200));

            evaluate();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });

        function updateEditorLayouts() {
            if(jsonEditor) jsonEditor.layout();
            if(queryEditor) queryEditor.layout();
            if(resultEditor) resultEditor.layout();
        }

        function updateStatus(state, msg = "", time = "0") {
            const bar = document.getElementById('status-bar');
            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            const timeEl = document.getElementById('eval-time');
            
            timeEl.innerText = `${time}ms`;

            if (state === 'ready' || state === 'success') {
                bar.className = 'bg-[#007acc] text-white text-xs px-3 py-1 flex justify-between items-center z-20 shrink-0 transition-colors duration-300';
                icon.setAttribute('data-lucide', 'check-circle');
                text.innerText = 'Ready';
            } else if (state === 'error') {
                bar.className = 'bg-[#b91c1c] dark:bg-[#8a2222] text-white text-xs px-3 py-1 flex justify-between items-center z-20 shrink-0 transition-colors duration-300';
                icon.setAttribute('data-lucide', 'x-circle');
                text.innerText = msg;
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        async function evaluate() {
            if (!jsonEditor || !queryEditor || !resultEditor) return;

            const t0 = performance.now();
            const errorOverlay = document.getElementById('error-overlay');
            errorOverlay.classList.add('hidden');
            
            const jsonText = jsonEditor.getValue();
            const queryText = queryEditor.getValue();
            
            let data;

            try {
                if (!jsonText.trim() || jsonText.includes('// Loading...')) {
                    data = undefined;
                } else {
                    data = JSON.parse(jsonText);
                }
            } catch (err) {
                showError(`JSON Parse Error: ${err.message}`);
                resultEditor.setValue('');
                updateStatus('error', 'Invalid JSON Input', Math.round(performance.now() - t0));
                return;
            }

            if (!queryText.trim() || queryText.includes('// Loading...')) {
                resultEditor.setValue('');
                updateStatus('ready', '', Math.round(performance.now() - t0));
                return;
            }

            try {
                const expression = jsonata(queryText);
                const result = await expression.evaluate(data);
                
                if (result === undefined) {
                    resultEditor.setValue('** no match **');
                } else {
                    resultEditor.setValue(JSON.stringify(result, null, 2));
                }
                
                const t1 = performance.now();
                updateStatus('success', '', Math.round(t1 - t0));
            } catch (err) {
                showError(`JSONata Error: ${err.message}\nPosition: ${err.position || 'Unknown'}`);
                updateStatus('error', `Query Error (Pos: ${err.position || '?'})`, Math.round(performance.now() - t0));
            }
        }

        function showError(msg) {
            const errorOverlay = document.getElementById('error-overlay');
            errorOverlay.innerText = msg;
            errorOverlay.classList.remove('hidden');
        }

        // --- New Feature: Reduce JSON based on Expression ---
        function pruneJSONData() {
            if (!jsonEditor || !queryEditor) return;
            const queryStr = queryEditor.getValue();
            let data;
            
            try {
                data = JSON.parse(jsonEditor.getValue());
            } catch (e) {
                showToast("Invalid JSON. Cannot reduce.");
                return;
            }

            function keepNode(key, value, qStr) {
                if (qStr.includes(key)) return true;
                if (typeof value === 'object' && value !== null) {
                    return Object.entries(value).some(([k, v]) => keepNode(k, v, qStr));
                }
                return false;
            }

            function prune(obj, qStr) {
                if (Array.isArray(obj)) {
                    return obj.map(item => prune(item, qStr));
                }
                if (typeof obj === 'object' && obj !== null) {
                    const newObj = {};
                    for (const key in obj) {
                        if (keepNode(key, obj[key], qStr)) {
                            newObj[key] = prune(obj[key], qStr);
                        }
                    }
                    return newObj;
                }
                return obj; 
            }

            const prunedData = prune(data, queryStr);
            jsonEditor.setValue(JSON.stringify(prunedData, null, 2));
            showToast("JSON successfully reduced based on query keys!");
        }

        // --- New Feature: Minify to 1 Line ---
        function minifyQuery() {
            if (!queryEditor) return;
            let query = queryEditor.getValue();
            query = query.replace(/"/g, '\\"');
            query = query.replace(/\r?\n/g, '\\n');
            queryEditor.setValue(query.trim());
            showToast("Expression condensed to 1 line!");
        }

        async function loadState() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                jsonEditor.setValue('// Loading from database...');
                queryEditor.setValue('// Loading from database...');

                try {
                    const response = await fetch(`${GAS_WEB_APP_URL}?id=${id}`);
                    const result = await response.json();

                    if (result.success) {
                        jsonEditor.setValue(result.data.json);
                        queryEditor.setValue(result.data.query);
                    } else {
                        showToast("Snippet not found, loading defaults.");
                        loadDefaults();
                    }
                } catch (e) {
                    console.error(e);
                    showToast("Failed to load shared link.");
                    loadDefaults();
                }
            } else {
                loadDefaults();
            }
        }

        function loadDefaults() {
            jsonEditor.setValue(JSON.stringify(defaultData, null, 2));
            queryEditor.setValue(defaultQuery);
        }

        async function copyShareLink() {
            const shareBtn = document.getElementById('share-btn');
            const originalHtml = shareBtn.innerHTML;
            
            const jsonText = jsonEditor.getValue();
            let currentQuery = queryEditor.getValue();

            const totalLength = jsonText.length + currentQuery.length;
            if (totalLength > 50000) {
                showError(`⚠️ Cannot share! Your total characters (${totalLength.toLocaleString()}) exceed the 50,000 character limit. Please reduce your data payload to save.`);
                updateStatus('error', 'Payload Too Large', 0);
                return;
            }

            shareBtn.disabled = true;
            shareBtn.innerHTML = `<svg class="animate-spin w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Generating...</span>`;

            try {
                const baseUrl = window.location.origin + window.location.pathname;
                const escapedBaseUrl = baseUrl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                
                const oldLinkRegex = new RegExp(`[ \\t]*\\/\\*\\s*${escapedBaseUrl}\\?id=[a-zA-Z0-9_-]+\\s*\\*\\/[ \\t]*\\n?`, 'g');
                let cleanQuery = currentQuery.replace(oldLinkRegex, '');

                const payload = { json: jsonText, query: cleanQuery };

                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    const newUrl = baseUrl + '?id=' + result.id;
                    window.history.replaceState(null, null, '?id=' + result.id);
                    
                    await navigator.clipboard.writeText(newUrl);

                    const commentStr = `/* ${newUrl} */`;
                    let updatedQuery = cleanQuery;
                    
                    if (updatedQuery.trim().startsWith('(')) {
                        const firstParenIndex = updatedQuery.indexOf('(');
                        updatedQuery = updatedQuery.slice(0, firstParenIndex + 1) + `\n    ${commentStr}` + updatedQuery.slice(firstParenIndex + 1);
                    } else {
                        updatedQuery = `${commentStr}\n` + updatedQuery;
                    }
                    
                    queryEditor.setValue(updatedQuery);
                    evaluate(); 
                    
                    showToast("Shareable link generated and copied!");
                } else {
                    throw new Error(result.error || "Unknown error saving");
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to generate link. Check API URL.");
            } finally {
                shareBtn.innerHTML = originalHtml;
                shareBtn.disabled = false;
                if (typeof lucide !== 'undefined') lucide.createIcons(); 
            }
        }

        function formatJSON() {
            try {
                jsonEditor.getAction('editor.action.formatDocument').run();
            } catch (err) {
                showToast("Cannot format: Invalid JSON");
            }
        }

        async function copyEditorContent(editorInstance) {
            const content = editorInstance.getValue();
            if (!content || content === '** no match **') return;
            
            try {
                await navigator.clipboard.writeText(content);
                showToast("Copied to clipboard!");
            } catch (err) {
                const input = document.createElement('textarea');
                input.value = content;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast("Copied to clipboard!");
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 3000);
        }

        // --- Easter Egg Feature ---
        let eggParticles = [];
        let animationId = null;

        function triggerEasterEgg() {
            const phrases = ['$.*', '$sum()', '$map()', '/* */', '[]', '{}', ':=', '?', '|', '$count()', '$average()', '^(sort)', '✨', '🚀'];
            const colors = ['#007acc', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#ec4899', '#3b82f6'];
            
            const rect = document.getElementById('status-bar').getBoundingClientRect();
            const startY = rect.top;
            const startX = window.innerWidth - 100; // General area of the version number

            for(let i=0; i<60; i++) {
                const el = document.createElement('div');
                el.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                el.style.position = 'fixed';
                el.style.left = '0px';
                el.style.top = '0px';
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                el.style.fontWeight = 'bold';
                el.style.fontSize = (Math.random() * 16 + 12) + 'px';
                el.style.pointerEvents = 'none';
                el.style.zIndex = '9999';
                el.style.textShadow = isDark ? '0px 0px 4px rgba(0,0,0,0.8)' : '0px 0px 4px rgba(255,255,255,0.8)';
                document.body.appendChild(el);

                eggParticles.push({
                    el: el,
                    x: startX + (Math.random() * 40 - 20),
                    y: startY,
                    vx: (Math.random() - 0.5) * 22,
                    vy: -(Math.random() * 15 + 10),
                    rot: Math.random() * 360,
                    vRot: (Math.random() - 0.5) * 15,
                    opacity: 1
                });
            }

            if (!animationId) {
                animateEggParticles();
            }
        }

        function animateEggParticles() {
            let active = false;
            for(let i=0; i<eggParticles.length; i++) {
                let p = eggParticles[i];
                if (p.opacity > 0) {
                    active = true;
                    p.vy += 0.4; // gravity
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.vRot;
                    
                    if (p.y > window.innerHeight) {
                        p.opacity -= 0.03;
                    }

                    p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.rot}deg)`;
                    p.el.style.opacity = p.opacity;
                } else if (p.el.parentNode) {
                    p.el.parentNode.removeChild(p.el);
                }
            }
            
            eggParticles = eggParticles.filter(p => p.opacity > 0);

            if (active) {
                animationId = requestAnimationFrame(animateEggParticles);
            } else {
                animationId = null;
            }
        }
    </script>
