<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobilize Extended Warranty POS Simulator</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Inline SVG Icon Component to replace the need for NPM icon packages
    const Icon = ({ name, size = 24, className = "" }) => {
      const paths = {
        car: '<path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/>',
        fileJson: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M10 12a2 2 0 0 0-2 2v1a2 2 0 0 1-2 2 2 2 0 0 1 2 2v1a2 2 0 0 0 2 2"/><path d="M14 18a2 2 0 0 0 2-2v-1a2 2 0 0 1 2-2 2 2 0 0 1-2-2v-1a2 2 0 0 0-2-2"/>',
        shieldCheck: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>',
        calendar: '<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>',
        activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
        weight: '<circle cx="12" cy="5" r="3"/><path d="M6.5 8a2 2 0 0 0-1.905 1.46L2.1 18.5A2 2 0 0 0 4 21h16a2 2 0 0 0 1.905-2.54l-2.495-9.04A2 2 0 0 0 17.5 8Z"/>',
        info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
        arrowRight: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
        loader2: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>'
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: paths[name] }} />
      );
    };

    const App = () => {
      // Default dates: Start tomorrow
      const defaultStart = new Date();
      defaultStart.setDate(defaultStart.getDate() + 1);

      const formatDate = (date) => date.toISOString().split('T')[0];

      const [formData, setFormData] = useState({
        vrn: 'AB-123-CD',
        make: 'Renault',
        model: 'Zoe',
        fuelType: 'FUEL_TYPE_ELECTRIC',
        mileage: 35000,
        vehicleWeight: 1502,
        hasOngoingWarranty: true,
        startDate: formatDate(defaultStart),
        variant: 'P2Y'
      });

      const [loading, setLoading] = useState(false);
      const [quoteResult, setQuoteResult] = useState(null);
      const [requestPayload, setRequestPayload] = useState(null);

      const handleInputChange = (e) => {
        const { name, value, type, checked } = e.target;
        setFormData(prev => ({
          ...prev,
          [name]: type === 'checkbox' ? checked : (type === 'number' ? Number(value) : value)
        }));
      };

      const getYearsFromVariant = (v) => {
        const map = { 'default': 1, 'P2Y': 2, 'P3Y': 3, 'P4Y': 4, 'P5Y': 5 };
        return map[v] || 1;
      };

      const simulateApiCall = () => {
        setLoading(true);
        setQuoteResult(null);

        const endDateObj = new Date(formData.startDate);
        endDateObj.setFullYear(endDateObj.getFullYear() + getYearsFromVariant(formData.variant));
        const formattedEndDate = formatDate(endDateObj);

        // Build the request payload for display
        const payload = {
          productConfigurationId: "mobilize-fr-ew",
          appId: "ondifrxku0z5wsi1x4fze8vo",
          country: "FR",
          language: "fr",
          contractPeriod: {
            startDate: formData.startDate,
            endDate: formattedEndDate
          },
          package: { name: "extended-warranty", coverages: { "extended-warranty": formData.variant } },
          subject: {
            vrn: formData.vrn,
            usage: "VEHICLE_USAGE_PRIVATE",
            make: formData.make,
            model: formData.model,
            fuelType: formData.fuelType,
            registrationDate: "2023-01-15",
            mileage: formData.mileage,
            hasOngoingWarranty: formData.hasOngoingWarranty,
            vehicleWeight: formData.vehicleWeight
          },
          policyholder: {
            entityType: "ENTITY_TYPE_PERSON",
            firstName: "Jean",
            lastName: "Dupont"
          }
        };
        setRequestPayload(payload);

        setTimeout(() => {
          // MOCK PRICING ENGINE (Translating the JSONata script)
          const bpMap = { 'default': 120, 'P2Y': 210, 'P3Y': 300, 'P4Y': 380, 'P5Y': 450 };
          const bp = bpMap[formData.variant] || 120;

          const af = 1.0; 
          const ef = formData.fuelType === 'FUEL_TYPE_ELECTRIC' ? 1.2 : 1.0;
          const mf = formData.mileage > 50000 ? 1.3 : 1.0;
          const wf = formData.vehicleWeight > 2000 ? 1.1 : 1.0;
          const wf2 = formData.hasOngoingWarranty ? 0.8 : 1.0;
          
          const durationYears = getYearsFromVariant(formData.variant);

          const nip = Number((bp * af * ef * mf * wf * wf2).toFixed(2));
          const ipt = Number((nip * 0.09).toFixed(2)); 
          const gareat = Number((6.5 * durationYears).toFixed(2)); 
          const cip = Number((nip + ipt + gareat).toFixed(2));

          const mockResponse = {
            id: "mock_" + Math.random().toString(36).substring(2, 10),
            status: "POLICY_QUOTE_STATUS_DRAFT",
            premium: {
              contract: {
                cip: cip,
                nip: nip,
                taxes: { ipt, gareat }
              },
              annualEquivalent: {
                cip: Number((cip / durationYears).toFixed(2)),
                nip: Number((nip / durationYears).toFixed(2))
              }
            },
            pricingFactors: {
              base: bp, electricFactor: ef, mileageFactor: mf, weightFactor: wf, warrantyDiscount: wf2, years: durationYears
            }
          };

          setQuoteResult(mockResponse);
          setLoading(false);
        }, 800); 
      };

      return (
        <div className="min-h-screen p-6">
          <header className="max-w-6xl mx-auto mb-8">
            <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-3">
              <Icon name="car" className="text-blue-600" size={32} />
              Mobilize Extended Warranty POS Simulator
            </h1>
            <p className="text-slate-500 mt-2">Test pricing logic and API payloads for the `mobilize-fr-ew` product.</p>
          </header>

          <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div className="lg:col-span-4 space-y-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                  <Icon name="shieldCheck" className="text-blue-500" size={20} />
                  Risk Details
                </h2>

                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Fuel Type</label>
                    <select 
                      name="fuelType" 
                      value={formData.fuelType} 
                      onChange={handleInputChange}
                      className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    >
                      <option value="FUEL_TYPE_ELECTRIC">Electric (x1.2)</option>
                      <option value="FUEL_TYPE_OTHER">Combustion/Other (x1.0)</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1">
                      <Icon name="activity" size={14} /> Mileage (km)
                    </label>
                    <input 
                      type="number" 
                      name="mileage" 
                      value={formData.mileage} 
                      onChange={handleInputChange}
                      className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    />
                    <p className="text-xs text-slate-500 mt-1">Surcharge (x1.3) if &gt; 50,000</p>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1">
                      <Icon name="weight" size={14} /> Vehicle Weight (kg)
                    </label>
                    <input 
                      type="number" 
                      name="vehicleWeight" 
                      value={formData.vehicleWeight} 
                      onChange={handleInputChange}
                      className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    />
                    <p className="text-xs text-slate-500 mt-1">Surcharge (x1.1) if &gt; 2,000</p>
                  </div>

                  <div className="flex items-center gap-3 py-2">
                    <input 
                      type="checkbox" 
                      id="hasOngoingWarranty"
                      name="hasOngoingWarranty" 
                      checked={formData.hasOngoingWarranty} 
                      onChange={handleInputChange}
                      className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500"
                    />
                    <label htmlFor="hasOngoingWarranty" className="text-sm font-medium text-slate-700">
                      Has Ongoing Warranty? (-20% discount)
                    </label>
                  </div>

                  <hr className="border-slate-100" />

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1">
                      <Icon name="calendar" size={14} /> Start Date
                    </label>
                    <input 
                      type="date" 
                      name="startDate" 
                      value={formData.startDate} 
                      onChange={handleInputChange}
                      className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1">
                      <Icon name="calendar" size={14} /> Duration Variant
                    </label>
                    <select 
                      name="variant" 
                      value={formData.variant} 
                      onChange={handleInputChange}
                      className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    >
                      <option value="default">1 Year (default)</option>
                      <option value="P2Y">2 Years (P2Y)</option>
                      <option value="P3Y">3 Years (P3Y)</option>
                      <option value="P4Y">4 Years (P4Y)</option>
                      <option value="P5Y">5 Years (P5Y)</option>
                    </select>
                    <p className="text-xs text-slate-500 mt-1">End date automatically calculated in payload.</p>
                  </div>

                  <button 
                    onClick={simulateApiCall}
                    disabled={loading}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg mt-4 transition flex items-center justify-center gap-2 disabled:opacity-70"
                  >
                    {loading ? <Icon name="loader2" className="animate-spin" size={20} /> : <Icon name="arrowRight" size={20} />}
                    Generate Quote
                  </button>
                </div>
              </div>
            </div>

            <div className="lg:col-span-8 space-y-6">
              {quoteResult ? (
                 <div className="bg-white p-6 rounded-xl shadow-sm border border-green-200 overflow-hidden relative">
                  <div className="absolute top-0 right-0 bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">
                    QUOTE READY
                  </div>
                  <h2 className="text-xl font-bold text-slate-800 mb-6">Quote Summary</h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                      <p className="text-sm text-slate-500 font-medium mb-1">Total Contract Price (CIP)</p>
                      <p className="text-4xl font-extrabold text-slate-900">€{quoteResult.premium.contract.cip.toFixed(2)}</p>
                      <p className="text-sm text-slate-500 mt-2">For {quoteResult.pricingFactors.years} years</p>
                    </div>

                    <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 flex flex-col justify-center">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-sm text-slate-600">Net Premium (NIP)</span>
                        <span className="font-semibold">€{quoteResult.premium.contract.nip.toFixed(2)}</span>
                      </div>
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-sm text-slate-600">Tax (IPT 9%)</span>
                        <span className="font-semibold text-slate-500">€{quoteResult.premium.contract.taxes.ipt.toFixed(2)}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-sm text-slate-600">Tax (GAREAT flat)</span>
                        <span className="font-semibold text-slate-500">€{quoteResult.premium.contract.taxes.gareat.toFixed(2)}</span>
                      </div>
                    </div>
                  </div>

                  <div className="mt-6 bg-yellow-50 p-4 rounded-lg border border-yellow-100 flex items-start gap-3 text-sm text-yellow-800">
                    <Icon name="info" className="shrink-0 mt-0.5" size={16} />
                    <div>
                      <strong>Applied JSONata Factors:</strong> 
                      <ul className="list-disc pl-5 mt-1 grid grid-cols-2 gap-x-4">
                        <li>Base: €{quoteResult.pricingFactors.base} ({quoteResult.pricingFactors.years}yr)</li>
                        <li>Electric: x{quoteResult.pricingFactors.electricFactor}</li>
                        <li>Mileage: x{quoteResult.pricingFactors.mileageFactor}</li>
                        <li>Weight: x{quoteResult.pricingFactors.weightFactor}</li>
                        <li>Warranty Discount: x{quoteResult.pricingFactors.warrantyDiscount}</li>
                      </ul>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="bg-white p-12 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center text-slate-400 h-64 text-center">
                  <Icon name="fileJson" size={48} className="mb-4 opacity-50" />
                  <p>Fill out the risk details and hit <strong>Generate Quote</strong> to see the pricing breakdown.</p>
                </div>
              )}

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-slate-900 rounded-xl shadow-sm overflow-hidden flex flex-col h-96">
                  <div className="bg-slate-800 px-4 py-2 text-xs font-mono text-slate-300 border-b border-slate-700 flex justify-between">
                    <span>POST /policies/v1/policy-quotes</span>
                    <span className="text-blue-400">Request Body</span>
                  </div>
                  <div className="p-4 overflow-auto flex-1 text-sm font-mono text-green-400">
                    {requestPayload ? (
                      <pre>{JSON.stringify(requestPayload, null, 2)}</pre>
                    ) : (
                      <span className="text-slate-600">Waiting for request...</span>
                    )}
                  </div>
                </div>

                <div className="bg-slate-900 rounded-xl shadow-sm overflow-hidden flex flex-col h-96">
                  <div className="bg-slate-800 px-4 py-2 text-xs font-mono text-slate-300 border-b border-slate-700 flex justify-between">
                    <span>Response</span>
                    <span className={quoteResult ? "text-green-400" : "text-blue-400"}>
                      {quoteResult ? "201 Created" : "Awaiting Data"}
                    </span>
                  </div>
                  <div className="p-4 overflow-auto flex-1 text-sm font-mono text-blue-300">
                    {loading ? (
                       <div className="flex items-center gap-2 text-slate-500">
                         <Icon name="loader2" className="animate-spin" size={14}/> 
                         Processing JSONata Engine...
                       </div>
                    ) : quoteResult ? (
                      <pre>{JSON.stringify(quoteResult, null, 2)}</pre>
                    ) : (
                      <span className="text-slate-600">Waiting for response...</span>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
