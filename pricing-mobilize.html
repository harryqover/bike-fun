<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Insurance API Playground</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline SVG Icons (Replacing Lucide imports for standalone HTML) ---
    const Activity = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const Play = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const Car = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"></path><circle cx="7" cy="17" r="2"></circle><path d="M9 17h6"></path><circle cx="17" cy="17" r="2"></circle></svg>;
    const Shield = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>;
    const Code = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
    const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const DollarSign = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;

    function App() {
      // --- STATE MANAGEMENT ---
      const [level, setLevel] = useState('detail');
      const [simulateStatus, setSimulateStatus] = useState('200');

      // Contract & Subscription
      const [subscriptionDate, setSubscriptionDate] = useState('2023-11-01');
      const [contractNumber, setContractNumber] = useState('1244879635');
      const [durationValue, setDurationValue] = useState(12);
      const [durationUnit, setDurationUnit] = useState('Months');

      // Risk Object (Vehicle)
      const [brand, setBrand] = useState('FERRARI');
      const [model, setModel] = useState('296');
      const [energy, setEnergy] = useState('Hybride');
      const [horsepowerDIN, setHorsepowerDIN] = useState(830);
      const [riskArea, setRiskArea] = useState('Zone 1');

      // Guarantees
      const [hasAssistance, setHasAssistance] = useState(true);
      const [hasGlassBreakage, setHasGlassBreakage] = useState(false);

      // API State
      const [loading, setLoading] = useState(false);
      const [responseJson, setResponseJson] = useState(null);
      const [responseStatus, setResponseStatus] = useState(null);

      // --- DERIVED REQUEST PAYLOAD ---
      const requestPayload = {
        subscriptionDate: subscriptionDate,
        contract: {
          contractNumber: contractNumber,
          offer: {
            offerLabel: "Standard Motor Policy",
            criteriasRiskObject: {
              brand: brand,
              model: model,
              energy: energy,
              horsepowerDIN: Number(horsepowerDIN),
              riskAreaNaturalEvent: riskArea,
              riskAreaAllAccidentDamageAAD: riskArea,
              riskAreaTheftFire: riskArea,
              typeGood: "Voiture"
            },
            subscriptionCriterias: {
              durationValue: Number(durationValue),
              durationUnit: durationUnit,
              deductible: 500
            },
            guarantees: [
              ...(hasAssistance ? [{
                guaranteeLabel: "Assistance",
                guaranteeOptions: [{ guaranteeOptionLabel: "Option assistance 45km" }]
              }] : []),
              ...(hasGlassBreakage ? [{
                guaranteeLabel: "Bris de glace",
                guaranteeOptions: []
              }] : [])
            ]
          }
        },
        feesBreakdown: "yes"
      };

      // --- MOCK API CALL ---
      const handleSimulateApiCall = () => {
        setLoading(true);
        setResponseJson(null);
        setResponseStatus(null);

        setTimeout(() => {
          setLoading(false);

          if (simulateStatus === '400') {
            setResponseStatus(400);
            setResponseJson({
              code: "100",
              message: "The request is not correct.",
              details: "[contract.offer.subscriptionCriterias.durationValue: must not be null]"
            });
            return;
          }

          if (simulateStatus === '401') {
            setResponseStatus(401);
            setResponseJson({
              message: "Authentication is required. Invalid OAuth2 Bearer token."
            });
            return;
          }

          // 200 OK Mock Response Generation based on inputs
          setResponseStatus(200);
          
          const basePremium = brand.toUpperCase() === 'FERRARI' ? 1500 : 500;
          const hpMultiplier = horsepowerDIN > 200 ? 1.5 : 1;
          const calculatedTotal = basePremium * hpMultiplier;

          const mockResponse = {
            contract: {
              contractNumber: contractNumber,
              offer: {
                offerLabel: "Standard Motor Policy",
                guarantees: []
              }
            },
            currency: "euro"
          };

          if (hasAssistance) {
            mockResponse.contract.offer.guarantees.push({
              guaranteeLabel: "Assistance",
              premium: {
                premiumIncludingTax: (calculatedTotal * 0.1).toFixed(2),
                premiumExcludingTax: (calculatedTotal * 0.08).toFixed(2),
                taxAmountChargedInsured: (calculatedTotal * 0.02).toFixed(2),
                taxes: [
                  { nameTax: "Assistance Tax", applicableRate: "20%", taxAmount: (calculatedTotal * 0.02).toFixed(2) }
                ]
              },
              guaranteeOptions: [
                {
                  guaranteeOptionLabel: "Option assistance 45km",
                  premium: {
                    premiumIncludingTax: "15.00",
                    premiumExcludingTax: "12.00",
                    taxAmountChargedInsured: "3.00"
                  }
                }
              ]
            });
          }

          if (hasGlassBreakage) {
            mockResponse.contract.offer.guarantees.push({
              guaranteeLabel: "Bris de glace",
              premium: {
                premiumIncludingTax: (calculatedTotal * 0.15).toFixed(2),
                premiumExcludingTax: (calculatedTotal * 0.12).toFixed(2),
                taxAmountChargedInsured: (calculatedTotal * 0.03).toFixed(2),
                taxes: [
                   { nameTax: "CAT NAT", applicableRate: "10%", taxAmount: (calculatedTotal * 0.03).toFixed(2) }
                ]
              }
            });
          }

          setResponseJson(mockResponse);
        }, 800); // 800ms fake network delay
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-7xl mx-auto space-y-6">
            
            {/* Header */}
            <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div>
                <h1 className="text-2xl font-bold flex items-center gap-2 text-indigo-700">
                  <Activity className="w-7 h-7" />
                  Motor Insurance Pricing API Playground
                </h1>
                <p className="text-slate-500 mt-1">
                  Interactive explorer for the <code className="bg-slate-100 px-1 rounded text-sm">POST /rate</code> endpoint.
                </p>
              </div>
              <div className="flex items-center gap-3">
                <select 
                  value={simulateStatus}
                  onChange={(e) => setSimulateStatus(e.target.value)}
                  className="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none"
                >
                  <option value="200">Simulate: 200 OK</option>
                  <option value="400">Simulate: 400 Bad Request</option>
                  <option value="401">Simulate: 401 Unauthorized</option>
                </select>
                <button 
                  onClick={handleSimulateApiCall}
                  disabled={loading}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-medium flex items-center gap-2 transition-colors disabled:opacity-70"
                >
                  {loading ? (
                    <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                  ) : (
                    <Play className="w-4 h-4 fill-current" />
                  )}
                  {loading ? 'Calculating...' : 'Send API Request'}
                </button>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              
              {/* LEFT COLUMN: Visual Form */}
              <div className="space-y-6">
                
                {/* Form Section: Contract */}
                <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center gap-2 font-semibold">
                    <FileText className="w-5 h-5 text-indigo-500" />
                    Contract & Subscription Info
                  </div>
                  <div className="p-5 grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Contract Number</label>
                      <input 
                        type="text" 
                        value={contractNumber} 
                        onChange={e => setContractNumber(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Start Date</label>
                      <input 
                        type="date" 
                        value={subscriptionDate} 
                        onChange={e => setSubscriptionDate(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Duration Value</label>
                      <input 
                        type="number" 
                        value={durationValue} 
                        onChange={e => setDurationValue(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">API Detail Level</label>
                      <select 
                        value={level} 
                        onChange={e => setLevel(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white"
                      >
                        <option value="summary">summary</option>
                        <option value="intermediary">intermediary</option>
                        <option value="detail">detail</option>
                      </select>
                    </div>
                  </div>
                </section>

                {/* Form Section: Vehicle (Risk Object) */}
                <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center gap-2 font-semibold">
                    <Car className="w-5 h-5 text-indigo-500" />
                    Vehicle Configuration (Risk Object)
                  </div>
                  <div className="p-5 grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Brand</label>
                      <input 
                        type="text" 
                        value={brand} 
                        onChange={e => setBrand(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Model</label>
                      <input 
                        type="text" 
                        value={model} 
                        onChange={e => setModel(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Energy</label>
                      <select 
                        value={energy} 
                        onChange={e => setEnergy(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white"
                      >
                        <option value="Essence">Essence</option>
                        <option value="Diesel">Diesel</option>
                        <option value="Hybride">Hybride</option>
                        <option value="Electrique">Electrique</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Horsepower (DIN)</label>
                      <input 
                        type="number" 
                        value={horsepowerDIN} 
                        onChange={e => setHorsepowerDIN(e.target.value)}
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                      />
                    </div>
                  </div>
                </section>

                {/* Form Section: Guarantees */}
                <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center gap-2 font-semibold">
                    <Shield className="w-5 h-5 text-indigo-500" />
                    Requested Coverages (Guarantees)
                  </div>
                  <div className="p-5 space-y-3">
                    <label className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                      <input 
                        type="checkbox" 
                        checked={hasAssistance} 
                        onChange={e => setHasAssistance(e.target.checked)}
                        className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500"
                      />
                      <div>
                        <div className="font-medium">Assistance</div>
                        <div className="text-xs text-slate-500">Includes 45km towing option</div>
                      </div>
                    </label>
                    <label className="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 transition-colors">
                      <input 
                        type="checkbox" 
                        checked={hasGlassBreakage} 
                        onChange={e => setHasGlassBreakage(e.target.checked)}
                        className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500"
                      />
                      <div>
                        <div className="font-medium">Bris de glace (Glass Breakage)</div>
                        <div className="text-xs text-slate-500">No deductible standard cover</div>
                      </div>
                    </label>
                  </div>
                </section>

              </div>

              {/* RIGHT COLUMN: API Console */}
              <div className="space-y-6 flex flex-col h-full">
                
                {/* Request JSON */}
                <section className="bg-slate-900 rounded-xl shadow-lg border border-slate-800 flex-1 flex flex-col overflow-hidden">
                  <div className="bg-slate-800 px-4 py-2 border-b border-slate-700 flex items-center justify-between">
                    <div className="flex items-center gap-2 text-slate-300 text-sm font-mono">
                      <Code className="w-4 h-4" />
                      POST /rate?level={level}
                    </div>
                    <span className="text-xs font-mono bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded">REQUEST BODY</span>
                  </div>
                  <div className="p-4 overflow-auto bg-slate-900 flex-1 custom-scrollbar" style={{maxHeight: '400px'}}>
                    <pre className="text-sm font-mono text-emerald-400">
                      {JSON.stringify(requestPayload, null, 2)}
                    </pre>
                  </div>
                </section>

                {/* Response JSON */}
                <section className="bg-slate-900 rounded-xl shadow-lg border border-slate-800 flex-1 flex flex-col overflow-hidden">
                  <div className="bg-slate-800 px-4 py-2 border-b border-slate-700 flex items-center justify-between">
                    <div className="flex items-center gap-2 text-slate-300 text-sm font-mono">
                      {responseStatus ? (
                        responseStatus === 200 ? 
                          <span className="flex items-center gap-1 text-emerald-400"><CheckCircle2 className="w-4 h-4"/> 200 OK</span> : 
                          <span className="flex items-center gap-1 text-red-400"><AlertCircle className="w-4 h-4"/> {responseStatus} Error</span>
                      ) : (
                        <span className="text-slate-500 italic">Awaiting Request...</span>
                      )}
                    </div>
                    <span className="text-xs font-mono bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded">RESPONSE JSON</span>
                  </div>
                  
                  <div className="p-4 overflow-auto bg-slate-900 flex-1 min-h-[250px] custom-scrollbar" style={{maxHeight: '400px'}}>
                    {!responseJson && !loading && (
                      <div className="h-full flex items-center justify-center text-slate-500 text-sm italic py-10">
                        Click "Send API Request" to see the simulated response.
                      </div>
                    )}
                    {loading && (
                      <div className="h-full flex flex-col items-center justify-center text-indigo-400 gap-3 py-10">
                        <div className="w-8 h-8 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin" />
                        <span className="text-sm font-mono animate-pulse">Awaiting API Gateway...</span>
                      </div>
                    )}
                    {responseJson && !loading && (
                      <pre className={`text-sm font-mono ${responseStatus === 200 ? 'text-blue-300' : 'text-red-300'}`}>
                        {JSON.stringify(responseJson, null, 2)}
                      </pre>
                    )}
                  </div>
                  
                  {/* Visual Breakdown (Only shows on success) */}
                  {responseStatus === 200 && responseJson && !loading && (
                    <div className="bg-white border-t border-slate-200 p-4">
                       <h3 className="text-sm font-bold text-slate-800 uppercase flex items-center gap-2 mb-3">
                         <DollarSign className="w-4 h-4 text-emerald-500"/>
                         Premium Breakdown UI Preview
                       </h3>
                       <div className="space-y-2">
                          {responseJson.contract.offer.guarantees.map((g, i) => (
                            <div key={i} className="flex justify-between items-center text-sm py-2 border-b border-slate-100 last:border-0">
                               <div className="font-medium text-slate-700">{g.guaranteeLabel}</div>
                               <div className="font-bold text-slate-900">
                                 {g.premium?.premiumIncludingTax} €
                               </div>
                            </div>
                          ))}
                          <div className="pt-2 mt-2 border-t border-slate-300 flex justify-between items-center">
                            <div className="font-bold text-slate-800">Total API Calculated Premium</div>
                            <div className="text-xl font-black text-indigo-600">
                              {responseJson.contract.offer.guarantees.reduce((acc, curr) => acc + parseFloat(curr.premium?.premiumIncludingTax || 0), 0).toFixed(2)} €
                            </div>
                          </div>
                       </div>
                    </div>
                  )}
                </section>

              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
